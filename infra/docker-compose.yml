version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    env_file:
      - ../backend/api/.env
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    command: uv run celery -A src.worker.celery_app worker --loglevel=info
    env_file:
      - ../backend/api/.env
    depends_on:
      - api
      - redis

  web:
    build:
      context: ../frontend/app
      dockerfile: Dockerfile
    env_file:
      - ../frontend/app/.env
    ports:
      - '3000:3000'
    depends_on:
      - api

  ml:
    build:
      context: ../ml/service
      dockerfile: Dockerfile
    ports:
      - '8100:8100'

volumes:
  postgres_data:
